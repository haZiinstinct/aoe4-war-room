<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="WAR ROOM – ein interaktives Age of Empires IV Counter-Lab für Einheiten, Matchups und bessere Kämpfe."
    />
    <meta name="theme-color" content="#0d100f" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 58'%3E%3Crect width='48' height='58' fill='%230b0e0d'/%3E%3Cg fill='none' stroke='%23e0b665' stroke-width='3' stroke-linejoin='round'%3E%3Cpath d='M4 3h40v34L24 54 4 37Z'/%3E%3Cpath d='M24 8v38M10 15l14 9 14-9M12 34l12-10 12 10'/%3E%3C/g%3E%3Ccircle cx='24' cy='24' r='3' fill='%23e0b665'/%3E%3C/svg%3E"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WAR ROOM — AoE IV Counter Lab" />
    <meta
      property="og:description"
      content="Interaktives Age of Empires IV Counter-Lab: Einheiten, Matchups und bessere Kämpfe. Deutsch und Englisch."
    />
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://data.aoe4world.com" />
    <!-- Nicht-render-blockierendes Laden der Webfonts: als preload holen und
         per onload zu einem echten Stylesheet umschalten. Ohne JS rendert die
         App ohnehin nicht, daher genügt der System-Font-Fallback. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <title>WAR ROOM — AoE IV Counter Lab</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p
        style="
          max-width: 32rem;
          margin: 4rem auto;
          padding: 0 1.5rem;
          font-family: system-ui, sans-serif;
          color: #f0e7d6;
          text-align: center;
        "
      >
        WAR ROOM braucht JavaScript, um Einheiten, Matchups und Drills
        darzustellen. Bitte JavaScript aktivieren.
        <br /><br />
        WAR ROOM needs JavaScript to show units, matchups and drills. Please
        enable JavaScript.
      </p>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
