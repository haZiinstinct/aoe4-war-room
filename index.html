<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WAR ROOM – ein interaktives Age of Empires IV Counter-Lab für Einheiten, Matchups und bessere Kämpfe."
    />
    <meta name="theme-color" content="#0d100f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://data.aoe4world.com" />
    <!-- Nicht-render-blockierendes Laden der Webfonts: als preload holen und
         per onload zu einem echten Stylesheet umschalten. Ohne JS rendert die
         App ohnehin nicht, daher genügt der System-Font-Fallback. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <title>WAR ROOM — AoE IV Counter Lab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
