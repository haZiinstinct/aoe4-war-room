  <body>
    <div id="root"></div>
    <noscript>
      <p
        style="
          max-width: 32rem;

          padding: 0 1.5rem;

          color: #f0e7d6;

        WAR ROOM braucht JavaScript, um Einheiten, Matchups und Drills

        WAR ROOM needs JavaScript to show units, matchups and drills. Please
        enable JavaScript.
      </p>

    <script type="module" src="/src/main.jsx"></script>
    <!-- Cookielose, anonyme Statistik via GoatCounter (DSGVO-freundlich, keine
         Cookies, keine geräteübergreifende Verfolgung). Vor dem Upload den
         Platzhalter DEIN-CODE durch deinen echten GoatCounter-Code ersetzen
         (Konto anlegen auf goatcounter.com → Code = Subdomain). -->
    <script
      data-goatcounter="https://DEIN-CODE.goatcounter.com/count"
      async
      src="https://gc.zgo.at/count.js"
    ></script>
