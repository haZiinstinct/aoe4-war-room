<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="WAR ROOM — Age of Empires IV Counter Lab">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#5c2b1d" stop-opacity="0.45" />
      <stop offset="55%" stop-color="#0b0e0d" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c680" />
      <stop offset="100%" stop-color="#c89d4f" />
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d5229" stop-opacity="0" />
      <stop offset="50%" stop-color="#c89d4f" />
      <stop offset="100%" stop-color="#6d5229" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="320" fill="#0b0e0d" />
  <rect width="1200" height="320" fill="url(#glow)" />
  <rect x="8" y="8" width="1184" height="304" fill="none" stroke="#2a2114" stroke-width="2" />
  <rect x="16" y="16" width="1168" height="288" fill="none" stroke="#4c3b22" stroke-width="1" opacity="0.6" />

  <!-- crest / brand mark -->
  <g transform="translate(96 92) scale(2.35)" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M4 3h40v34L24 54 4 37Z" />
    <path d="M24 8v38M10 15l14 9 14-9M12 34l12-10 12 10" />
  </g>
  <circle cx="152.4" cy="148.4" r="7" fill="url(#gold)" />

  <!-- wordmark -->
  <text x="286" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" letter-spacing="6" fill="#f0e7d6">WAR ROOM</text>
  <text x="290" y="196" font-family="'Segoe UI', system-ui, sans-serif" font-size="23" font-weight="600" letter-spacing="7" fill="#c89d4f">AGE OF EMPIRES IV · INTERACTIVE COUNTER LAB</text>

  <!-- rule -->
  <rect x="290" y="224" width="720" height="2" fill="url(#rule)" />

  <!-- stat strip -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="600" fill="#a49d90" letter-spacing="1">
    <text x="290" y="260">205 units</text>
    <text x="430" y="260" fill="#6d5229">·</text>
    <text x="452" y="260">42,025 matchups</text>
    <text x="672" y="260" fill="#6d5229">·</text>
    <text x="694" y="260">23 civilizations</text>
    <text x="884" y="260" fill="#6d5229">·</text>
    <text x="906" y="260" fill="#78a16e">DE / EN</text>
  </g>
</svg>
