# aoe4.hazii.org — WAR ROOM (statische Single-File-App), nginx
#
# Als server-Block einbinden (z. B. /etc/nginx/sites-available/aoe4.hazii.org)
# und die Standalone-HTML als index.html in den root legen. TLS via certbot.

server {
    listen 80;
    server_name aoe4.hazii.org;

    root /var/www/aoe4.hazii.org;   # hier index.html ablegen
    index index.html;

    # Content-Security-Policy passend zum tatsächlichen Build:
    #   Bilder: data.aoe4world.com · Fonts/Styles: eingebettet (data:)
    #   Statistik: gc.zgo.at (Script) + *.goatcounter.com (Beacon)
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; img-src 'self' data: https://data.aoe4world.com https://*.goatcounter.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline' https://gc.zgo.at; connect-src 'self' https://*.goatcounter.com" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;

    # Text-Inhalte komprimieren (die eingebetteten Fonts vergrößern die Datei).
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;

    # HTML nicht lange cachen, damit neue Releases sofort sichtbar sind.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri /index.html;
    }
}
